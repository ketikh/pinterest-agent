name: CI

# Disabled automatic triggers per operator request — these checks were noisy
# and the live app on Railway doesn't depend on them. Re-enable later by
# uncommenting the push/pull_request blocks.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install flake8 black isort pytest-cov

      - name: Lint with flake8
        # Config lives in .flake8 — keep CLI args minimal so the config wins.
        run: flake8 ai_bag_agent/ tests/

      - name: Run tests
        env:
          FLASK_ENV: testing
          FLASK_SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: sqlite:///test.db
          TELEGRAM_BOT_TOKEN: ""
        run: |
          python -m pytest tests/unit/ -v --cov=ai_bag_agent --cov-report=xml --cov-fail-under=50

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false
